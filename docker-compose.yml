version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sokapp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Database Configuration (Aiven)
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_CONNECTION_LIMIT=10
      
      # Server Configuration
      - PORT=5000
      - NODE_ENV=production
      
      # Session Configuration
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_TIMEOUT=3600000
      
      # API URLs (Update these for your VPS)
      - API_BASE_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - REACT_APP_API_URL=${BACKEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      
      # CORS Configuration
      - CORS_ORIGIN=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${FRONTEND_URL},${BACKEND_URL}
      
      # Email Configuration (Brevo)
      - BREVO_API_KEY=${BREVO_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL}
      
      # Other
      - MAX_REQUEST_SIZE=10mb
    networks:
      - sokapp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service (React with Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_API_URL=${BACKEND_URL}
    container_name: sokapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sokapp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  sokapp-network:
    driver: bridge
